stages:
  - validate
  - deploy

default:
  image: node:20-bullseye
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

variables:
  NEXT_TELEMETRY_DISABLED: "1"

validate:native:
  stage: validate
  script:
    - pnpm --filter native check-types

validate:offline-tests:
  stage: validate
  script:
    - pnpm test:native

validate:web:
  stage: validate
  script:
    - pnpm --filter web build

deploy:web:vercel:
  stage: deploy
  needs:
    - validate:web
    - validate:offline-tests
    - validate:native
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - test -n "$VERCEL_TOKEN"
    - test -n "$VERCEL_ORG_ID"
    - test -n "$VERCEL_PROJECT_ID"
    - pnpm dlx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
    - pnpm dlx vercel build --prod --token "$VERCEL_TOKEN"
    - pnpm dlx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
